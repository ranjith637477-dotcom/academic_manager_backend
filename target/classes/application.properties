# ==========================
# SERVER
# ==========================
server.port=${PORT:8080}
spring.application.name=sams-backend

# ==========================
# DATABASE (PostgreSQL)
# ==========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================
# JPA / HIBERNATE
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================
# JWT
# ==========================
jwt.secret=${JWT_SECRET:sams_super_secret_key_2024_academic_management_system_secure_token}
jwt.expiration=86400000

# ==========================
# FILE UPLOAD
# ==========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
file.upload.dir=./uploads

# ==========================
# MAIL
# ==========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================
# CORS
# ==========================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ==========================
# SWAGGER
# ==========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ==========================
# LOGGING
# ==========================
logging.level.com.sams=INFO
logging.level.org.springframework.security=WARN
